name: Multiple Jobs Demo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - run: echo "Building..."

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - run: echo "Building Docker image..."

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - run: echo "Deploying..."
